version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: sims_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: SIMS
      MYSQL_USER: Yowun
      MYSQL_PASSWORD: admin123
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: sims_server
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_URL=jdbc:mysql://db:3306/SIMS?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      - DB_USERNAME=Yowun
      - DB_PASSWORD=admin123
      - MAIL_USERNAME=${MAIL_USERNAME:-}
      - MAIL_APP_PASSWORD=${MAIL_APP_PASSWORD:-}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sims_frontend
    ports:
      - "5173:80"
    depends_on:
      - server

volumes:
  db_data:
